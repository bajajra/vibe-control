# Builds Vibe Control.app with PyInstaller, packages a drag-to-Applications DMG,
# and publishes it as a GitHub Release.
#
# Version is read from the VERSION file (single source of truth).
# On push to main: auto-creates a git tag (v<version>) and a GitHub Release.
# On workflow_dispatch: builds artifact only (no release).

name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed to check existing tags

      - name: Read version
        id: version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Version: ${version}"

      - name: Check if tag already exists
        id: tag_check
        if: github.ref == 'refs/heads/main'
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install PortAudio (for PyAudio)
        run: brew install portaudio

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "pyinstaller>=6.0"

      - name: PyInstaller
        run: pyinstaller VibeControl.spec --noconfirm

      - name: Remove loose COLLECT folder from dist
        run: rm -rf dist/VibeControl

      - name: Assemble DMG layout (app + Applications alias)
        run: |
          mkdir -p dmg_layout
          cp -R "dist/Vibe Control.app" dmg_layout/
          ln -s /Applications dmg_layout/Applications

      - name: Create DMG
        run: |
          hdiutil create -volname "Vibe Control" -srcfolder dmg_layout -ov -format UDZO \
            "dist/vibe-control-${{ steps.version.outputs.version }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-control-${{ steps.version.outputs.version }}
          path: dist/vibe-control-${{ steps.version.outputs.version }}.dmg
          if-no-files-found: error

      - name: Create tag and publish GitHub Release
        if: github.ref == 'refs/heads/main' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Vibe Control ${{ steps.version.outputs.tag }}
          files: dist/vibe-control-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
